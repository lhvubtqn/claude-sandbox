services:
  claude-sandbox:
    build: .
    container_name: claude-sandbox
    working_dir: /workspace/${PROJECT_NAME:-placeholder}
    command: sleep infinity
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${PROJECT_PATH:-/tmp}:/workspace/${PROJECT_NAME:-placeholder}
      - ${HOME}/.claude:/root/.claude
      - cargo-registry:/root/.cargo/registry
      - cargo-git:/root/.cargo/git
      - rustup-downloads:/root/.rustup/downloads
      - npm-cache:/root/.npm
      - solana-config:/root/.config/solana
      - vscode-server:/root/.vscode-server

volumes:
  cargo-registry:
  cargo-git:
  rustup-downloads:
  npm-cache:
  solana-config:
  vscode-server:
